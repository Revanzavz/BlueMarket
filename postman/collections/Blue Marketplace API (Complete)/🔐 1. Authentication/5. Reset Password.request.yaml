$kind: http-request
url: "{{base_url}}/password/reset"
method: POST
headers:
  Accept: application/json
body:
  type: formdata
  content:
    - type: text
      key: token
      value: "{{token}}"
    - type: text
      key: email
      value: admin@gmail.com
    - type: text
      key: password
      value: newpassword123
    - type: text
      key: password_confirmation
      value: newpassword123
order: 5000
